<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="100%" style="stop-color:#050d24"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0066cc"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="48%" r="45%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="48%" r="55%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowStrong" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="charGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" rx="72" fill="url(#bgGrad)"/>
  <rect width="400" height="400" rx="72" fill="url(#outerGlow)"/>

  <rect x="8" y="8" width="384" height="384" rx="66"
        fill="none" stroke="url(#blueGrad)" stroke-width="2.5"
        opacity="0.9" filter="url(#neonGlow)"/>
  <rect x="14" y="14" width="372" height="372" rx="61"
        fill="none" stroke="url(#blueGrad)" stroke-width="0.6" opacity="0.2"/>

  <g stroke="url(#blueGrad)" stroke-linecap="round" opacity="0.8" filter="url(#subtleGlow)">
    <line x1="26" y1="26" x2="56" y2="26" stroke-width="2"/>
    <line x1="26" y1="26" x2="26" y2="56" stroke-width="2"/>
    <line x1="374" y1="26" x2="344" y2="26" stroke-width="2"/>
    <line x1="374" y1="26" x2="374" y2="56" stroke-width="2"/>
    <line x1="26" y1="374" x2="56" y2="374" stroke-width="2"/>
    <line x1="26" y1="374" x2="26" y2="344" stroke-width="2"/>
    <line x1="374" y1="374" x2="344" y2="374" stroke-width="2"/>
    <line x1="374" y1="374" x2="374" y2="344" stroke-width="2"/>
  </g>

  <circle cx="200" cy="178" r="130"
          fill="none" stroke="url(#blueGrad)" stroke-width="0.8"
          stroke-dasharray="4 8" opacity="0.25"/>
  <path d="M200 50 A128 128 0 1 1 72 178"
        fill="none" stroke="url(#blueGrad)" stroke-width="2.5"
        stroke-linecap="round" opacity="0.7" filter="url(#neonGlow)"/>
  <path d="M200 68 A110 110 0 1 1 92 232"
        fill="none" stroke="url(#blueGrad)" stroke-width="1.2"
        stroke-linecap="round" opacity="0.35"/>
  <path d="M310 140 A115 115 0 0 1 110 270"
        fill="none" stroke="url(#blueGrad)" stroke-width="1"
        stroke-linecap="round" opacity="0.2"/>
  <circle cx="200" cy="178" r="100" fill="url(#centerGlow)"/>

  <g stroke="url(#blueGrad)" stroke-linecap="round" opacity="0.4">
    <line x1="82"  y1="108" x2="66"  y2="96"  stroke-width="1.5"/>
    <line x1="76"  y1="122" x2="58"  y2="114" stroke-width="1"/>
    <line x1="318" y1="108" x2="334" y2="96"  stroke-width="1.5"/>
    <line x1="324" y1="122" x2="342" y2="114" stroke-width="1"/>
    <line x1="200" y1="50"  x2="200" y2="36"  stroke-width="1.5"/>
    <line x1="184" y1="52"  x2="180" y2="38"  stroke-width="1"/>
    <line x1="216" y1="52"  x2="220" y2="38"  stroke-width="1"/>
  </g>

  <text x="200" y="220"
    font-family="'Noto Serif SC','SimSun','STSong',serif"
    font-size="160" font-weight="900" fill="#38bdf8"
    text-anchor="middle" opacity="0.15" filter="url(#neonGlowStrong)">水</text>
  <text x="200" y="218"
    font-family="'Noto Serif SC','SimSun','STSong',serif"
    font-size="158" font-weight="900" fill="url(#whiteGrad)"
    text-anchor="middle" filter="url(#charGlow)" opacity="0.97">水</text>

  <line x1="58"  y1="306" x2="165" y2="306"
        stroke="url(#blueGrad)" stroke-width="1" opacity="0.5" filter="url(#subtleGlow)"/>
  <line x1="235" y1="306" x2="342" y2="306"
        stroke="url(#blueGrad)" stroke-width="1" opacity="0.5" filter="url(#subtleGlow)"/>
  <polygon points="200,300 207,306 200,312 193,306"
           fill="url(#blueGrad)" opacity="0.9" filter="url(#subtleGlow)"/>

  <text x="200" y="346"
    font-family="'Palatino Linotype','Palatino','Book Antiqua',Georgia,serif"
    font-size="50" font-weight="900" fill="#38bdf8"
    text-anchor="middle" letter-spacing="10" opacity="0.3"
    filter="url(#neonGlowStrong)">KUNG FU</text>
  <text x="200" y="346"
    font-family="'Palatino Linotype','Palatino','Book Antiqua',Georgia,serif"
    font-size="50" font-weight="900" fill="url(#whiteGrad)"
    text-anchor="middle" letter-spacing="10" filter="url(#subtleGlow)">KUNG FU</text>

  <text x="200" y="374"
    font-family="'Arial','Helvetica',sans-serif"
    font-size="15" font-weight="600" fill="url(#blueGrad)"
    text-anchor="middle" letter-spacing="7" opacity="0.85"
    filter="url(#subtleGlow)">CURSOS ONLINE</text>

  <circle cx="68"  cy="370" r="2" fill="url(#blueGrad)" opacity="0.6" filter="url(#subtleGlow)"/>
  <circle cx="332" cy="370" r="2" fill="url(#blueGrad)" opacity="0.6" filter="url(#subtleGlow)"/>
</svg>
